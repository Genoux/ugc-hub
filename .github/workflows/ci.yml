name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint
        run: bun run lint

      - name: Architecture lint
        run: bun run lint:arch

      - name: Type check
        run: bunx tsc --noEmit