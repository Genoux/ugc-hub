name = "ugc-media"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ugc-hub"

[vars]
ALLOWED_ORIGIN = "https://ugc.inbeat.agency"

[env.dev]
[[env.dev.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ugc-hub-dev"

[env.dev.vars]
ALLOWED_ORIGIN = "http://localhost:3000"